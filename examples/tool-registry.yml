tools:
  - name: playwright
    category: browser-evidence
    description: Local browser automation and evidence capture.
    source: https://github.com/microsoft/playwright
    version: "1.55.0"
    checksum: "managed-by-npm-lock"
    install:
      type: npm
      package: playwright
    permissions:
      network: true
      filesystem_write: true
      destructive: false
      active_scanning: false
    safety:
      allowed_modes:
        - safe
        - deep-safe
      blocked_capabilities:
        - brute_force
        - credential_stuffing
        - destructive_testing
        - data_exfiltration
        - waf_evasion
    actions:
      - action_type: browser.navigate
        risk_level: low
        capabilities:
          - browser_automation
          - evidence_capture
        state_changing: false
        destructive: false
        requires_approval: false
        network: true
        filesystem_write: true
      - action_type: browser.request
        risk_level: low
        capabilities:
          - browser_automation
        state_changing: false
        destructive: false
        requires_approval: false
        network: true
        filesystem_write: false
