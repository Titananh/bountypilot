program: local-lab
platform: local

in_scope:
  - "127.0.0.1"
  - "localhost"

out_of_scope: []

rules:
  automated_scanning: full
  destructive_testing: false
  rate_limit: "10rps"
  browser_crawling: true
  deep_safe_mode: true
  lab_mode: true
  lab_authorization_file: local-lab-authorization.md
  require_human_approval_for_risky_actions: true

accounts:
  required: false
  use_researcher_owned_test_accounts_only: true

evidence:
  screenshots: true
  har: true
  console_logs: true
  dom_snapshot: true
  video: optional
  browser_trace: true
  desktop_screenshots: optional
  mask_secrets: true

integrations: {}

