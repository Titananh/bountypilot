name: Bug report
description: Report a reproducible BountyPilot CLI or workflow bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a BountyPilot bug. Do not include third-party target data, real secrets, cookies, tokens, API keys, or private program details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Use local labs, sanitized fixtures, or demo commands when possible.
      placeholder: |
        1. Run `bugbounty ...`
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: BountyPilot version
      placeholder: output of `bugbounty --version`
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI/TUI
        - Skill/workflow
        - Scope/policy/safety
        - Evidence/reporting
        - Providers
        - Tool execution
        - Packaging/release
        - Other
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: This report does not include secrets, real target data, or unauthorized testing details.
          required: true

