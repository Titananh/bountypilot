name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  release:
    name: Verify and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release gate
        run: npm run verify:release

      - name: Pack npm tarball
        run: npm pack

      - name: Generate SBOM
        run: npm run --silent sbom > bountypilot-sbom.cdx.json

      - name: Bundle standalone skill
        run: node dist/cli/index.js skill bundle bug-bounty-pilot --output bug-bounty-pilot.skill.zip --json

      - name: Verify standalone skill bundle
        run: node dist/cli/index.js skill verify-bundle bug-bounty-pilot.skill.zip --json

      - name: Generate checksums
        shell: bash
        run: sha256sum bountypilot-*.tgz bug-bounty-pilot.skill.zip bountypilot-sbom.cdx.json > SHA256SUMS.txt

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            bountypilot-*.tgz
            bug-bounty-pilot.skill.zip
            bountypilot-sbom.cdx.json

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bountypilot-release-artifacts
          path: |
            bountypilot-*.tgz
            bug-bounty-pilot.skill.zip
            bountypilot-sbom.cdx.json
            SHA256SUMS.txt
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            bountypilot-*.tgz
            bug-bounty-pilot.skill.zip
            bountypilot-sbom.cdx.json
            SHA256SUMS.txt
          generate_release_notes: true
