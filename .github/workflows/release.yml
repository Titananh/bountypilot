name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  release:
    name: Verify and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22.13.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify release gate
        run: npm run verify:release

      - name: Build release bundle
        run: node dist/cli/index.js release bundle --output .release --force --json

      - name: Verify release bundle
        run: node dist/cli/index.js release verify-bundle .release --json

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            .release/bountypilot-*.tgz
            .release/bug-bounty-pilot.skill.zip
            .release/bountypilot-sbom.cdx.json
            .release/release-manifest.json
            .release/SHA256SUMS.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bountypilot-release-artifacts
          path: |
            .release/bountypilot-*.tgz
            .release/bug-bounty-pilot.skill.zip
            .release/bountypilot-sbom.cdx.json
            .release/release-manifest.json
            .release/SHA256SUMS.txt
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            .release/bountypilot-*.tgz
            .release/bug-bounty-pilot.skill.zip
            .release/bountypilot-sbom.cdx.json
            .release/release-manifest.json
            .release/SHA256SUMS.txt
          generate_release_notes: true
